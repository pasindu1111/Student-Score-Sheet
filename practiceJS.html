<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Score Sheet</title>

    <style>
      body {
        background-color: lightblue;
        font-family: Arial, sans-serif;
      }

      h1 {
        color: darkblue;
      }

      h2 {
        font-size: 1.2rem;
      }

      button {
        cursor: pointer;
      }

      #addDataDialogBtn {
        background-color: darkblue;
        color: white;
        padding: 8px 12px;
        border-radius: 5px;
        border: none;
      }

      .dialog-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);

        display: none;
        opacity: 0;

        justify-content: center;
        align-items: center;

        transition: all 200ms ease-in-out;
      }

      .dialog-container > div {
        background-color: white;
        padding: 20px;
        border-radius: 5px;
        position: relative;
        box-shadow: 0 0 5px black;
        min-width: 250px;
      }

      .field-set {
        margin-top: 10px;
      }

      .field-set input {
        width: 100%;
        padding: 5px;
        margin-top: 5px;
        box-sizing: border-box;
      }

      #closeAddDataBtn {
        position: absolute;
        top: 5px;
        right: 5px;

        background-color: red;
        color: white;

        border-radius: 50%;
        border: none;

        padding: 2px 6px;
      }

      #addDataBtn {
        background-color: green;
        color: white;

        border-radius: 5px;
        border: none;

        padding: 8px;
        width: 100%;

        margin-top: 15px;
      }

      #info {
        margin-top: 15px;
        font-weight: bold;
      }

      table {
        border-collapse: collapse;
        width: 100%;
        margin-top: 20px;
        background-color: white;
      }

      table,
      th,
      td {
        border: 1px solid black;
      }

      th,
      td {
        padding: 10px;
        text-align: center;
      }

      .delete-btn {
        background-color: red;
        color: white;

        border: none;
        border-radius: 5px;

        padding: 5px 10px;
      }
    </style>
  </head>

  <body>
    <h1>Student Score Sheet</h1>

    <button id="addDataDialogBtn">Add Data</button>

    <div id="info"></div>

    <table>
      <thead>
        <tr>
          <th>Position</th>
          <th>Name</th>
          <th>Score</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody id="list"></tbody>
    </table>

    
    <div class="dialog-container">
      <div>
        <h2>Add Data</h2>

        <div class="field-set">
          <label for="name">Name</label>
          <input type="text" id="name" />
        </div>

        <div class="field-set">
          <label for="score">Score</label>
          <input type="number" id="score" />
        </div>

        <button id="addDataBtn">Add</button>
        <button id="closeAddDataBtn">X</button>
      </div>
    </div>

    <script>
      const list = document.getElementById("list");
      const addDataDialogBtn = document.getElementById(
        "addDataDialogBtn"
      );
      const closeAddDataBtn = document.getElementById(
        "closeAddDataBtn"
      );
      const dialogContainer = document.querySelector(
        ".dialog-container"
      );
      const nameInput = document.getElementById("name");
      const scoreInput = document.getElementById("score");
      const addDataBtn = document.getElementById("addDataBtn");
      const info = document.getElementById("info");

      const students = [];

      
      addDataDialogBtn.addEventListener("click", function () {
        dialogContainer.style.display = "flex";

        setTimeout(function () {
          dialogContainer.style.opacity = "1";
        }, 10);
      });

    
      closeAddDataBtn.addEventListener("click", closeDialog);

      function closeDialog() {
        dialogContainer.style.opacity = "0";

        setTimeout(function () {
          dialogContainer.style.display = "none";
        }, 200);
      }

      
      addDataBtn.addEventListener("click", addData);

      function addData() {
        let name = nameInput.value.trim();
        let score = parseInt(scoreInput.value);

        if (name !== "" && !isNaN(score)) {
          students.push({
            name: name,
            score: score,
          });

          displayList();

          
          nameInput.value = "";
          scoreInput.value = "";

       
          closeDialog();
        } else {
          alert("Please fill all fields correctly.");
        }
      }

   
      function displayList() {
      
        students.sort(function (a, b) {
          return b.score - a.score;
        });

        
        let total = 0;

        let max = students[0]?.score || 0;
        let min = students[0]?.score || 0;

        students.forEach(function (student) {
          if (student.score > max) {
            max = student.score;
          }

          if (student.score < min) {
            min = student.score;
          }

          total += student.score;
        });

        let average = 0;

        if (students.length > 0) {
          average = total / students.length;
        }

        
        info.innerHTML = `
          No. Students : ${students.length} <br>
          Max : ${max} | Min : ${min} | Average : ${average.toFixed(2)}
        `;

       
        list.innerHTML = "";

       
        students.forEach(function (student, index) {
          let record = document.createElement("tr");

          let td0 = document.createElement("td");
          td0.innerHTML = index + 1;

          let td1 = document.createElement("td");
          td1.innerHTML = student.name;

          let td2 = document.createElement("td");
          td2.innerHTML = student.score;

          let td3 = document.createElement("td");

         
          let deleteBtn = document.createElement("button");
          deleteBtn.innerHTML = "Delete";
          deleteBtn.classList.add("delete-btn");

          deleteBtn.addEventListener("click", function () {
            students.splice(index, 1);
            displayList();
          });

          td3.appendChild(deleteBtn);

        
          record.appendChild(td0);
          record.appendChild(td1);
          record.appendChild(td2);
          record.appendChild(td3);

          list.appendChild(record);
        });
      }
    </script>
  </body>
</html>
